<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfólio — LDMSMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100;0,300;0,700;0,900;1,300&family=VT323&display=swap" rel="stylesheet">
  <style>

    :root{
      --bg:#0d0015;--deep:#07000f;--cyan:#00f5ff;--magenta:#ff2d9e;
      --purple:#b44bff;--lavender:#c8a0f8;--pink-dim:rgba(255,45,158,.15);
      --cyan-dim:rgba(0,245,255,.10);--text:#f0e6ff;--muted:#9070b8;
      --border:rgba(180,75,255,.25);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;}

    /* VHS scanlines */
    body::before{content:'';position:fixed;inset:0;z-index:998;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}
    body.vhs::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px);
      animation:vhsShift .1s steps(1) infinite;}
    @keyframes vhsShift{0%{background-position:0 0;}25%{background-position:0 1px;}50%{background-position:0 2px;}75%{background-position:0 3px;}}
    body.vhs .parallax-img{animation:vhsNoise 8s steps(1) infinite;filter:saturate(1.4) brightness(.65) contrast(1.1);}
    @keyframes vhsNoise{0%,97%{transform:scale(1.05) translateY(0);}98%{transform:scale(1.05) translateY(-2px) skewX(.3deg);filter:saturate(1.8) brightness(.5) hue-rotate(5deg);}99%{transform:scale(1.05) translateY(1px);}100%{transform:scale(1.05) translateY(0);}}
    body.vhs .hero-section::before{content:'';position:absolute;left:0;right:0;height:3px;background:rgba(0,245,255,.15);animation:trackLine 5s linear infinite;z-index:2;pointer-events:none;}
    @keyframes trackLine{0%{top:-10px;opacity:.8;}100%{top:110%;opacity:0;}}

    /* VHS toggle */
    .vhs-toggle{position:fixed;bottom:1.5rem;right:1.5rem;z-index:1000;font-family:'VT323',monospace;font-size:.8rem;letter-spacing:.2em;padding:.4rem .9rem;border:1px solid var(--cyan);background:rgba(0,0,0,.7);color:var(--cyan);cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);}
    .vhs-toggle:hover{background:var(--cyan);color:#000;}
    body.vhs .vhs-toggle{border-color:var(--magenta);color:var(--magenta);}
    body.vhs .vhs-toggle:hover{background:var(--magenta);color:#fff;}

    /* retro grid */
    .retro-grid{position:fixed;bottom:0;left:0;right:0;height:45vh;z-index:0;pointer-events:none;overflow:hidden;perspective:300px;}
    .retro-grid::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;transform:rotateX(55deg) translateY(-30%) scale(2.5);transform-origin:bottom center;animation:gridScroll 8s linear infinite;}
    .retro-grid::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 50%,var(--bg) 100%);}
    @keyframes gridScroll{from{background-position:0 0;}to{background-position:0 60px;}}

    /* blobs */
    .blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.25;pointer-events:none;z-index:0;}
    .blob-1{width:500px;height:500px;background:var(--magenta);top:-150px;right:-100px;animation:blobFloat 12s ease-in-out infinite;}
    .blob-2{width:400px;height:400px;background:var(--cyan);bottom:10%;left:-120px;animation:blobFloat 15s ease-in-out infinite reverse;}
    .blob-3{width:300px;height:300px;background:var(--purple);top:40%;left:40%;animation:blobFloat 10s ease-in-out infinite 3s;}
    @keyframes blobFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.06);}}

    /* header */
    header{position:sticky;top:0;z-index:100;padding:1rem 4rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:rgba(13,0,21,.88);backdrop-filter:blur(16px);animation:fadeDown .9s ease both;}
    .logo{font-family:'VT323',monospace;font-size:1.35rem;letter-spacing:.2em;background:linear-gradient(90deg,var(--cyan),var(--magenta),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(0,245,255,.4));text-decoration:none;}
    nav{display:flex;gap:2rem;align-items:center;}
    nav a{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s,text-shadow .2s;}
    nav a:hover{color:var(--cyan);text-shadow:0 0 10px var(--cyan);}
    .lang-toggle{font-family:'VT323',monospace;font-size:.85rem;letter-spacing:.15em;color:var(--purple);border:1px solid var(--border);padding:.15rem .6rem;text-decoration:none;transition:all .2s;}
    .lang-toggle:hover{border-color:var(--purple);color:#fff;box-shadow:0 0 10px rgba(180,75,255,.3);}

    /* section header */
    .section-header{position:relative;z-index:1;padding:3rem 4rem 2rem;display:flex;align-items:center;gap:1.5rem;}
    .section-header h3{font-family:'VT323',monospace;font-size:1.1rem;letter-spacing:.4em;color:var(--cyan);text-shadow:0 0 12px var(--cyan);white-space:nowrap;}
    .section-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--cyan),var(--magenta),transparent);opacity:.4;}

    /* footer */
    footer{position:relative;z-index:1;margin-top:4rem;padding:2rem 4rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-family:'VT323',monospace;font-size:.85rem;letter-spacing:.22em;color:var(--muted);}
    footer .foot-logo{font-size:1.4rem;background:linear-gradient(90deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(0,245,255,.4));}

    /* modal */
    .modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(7,0,15,.95);align-items:center;justify-content:center;padding:2rem;backdrop-filter:blur(10px);}
    .modal.open{display:flex;animation:fadeIn .25s ease both;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .modal-inner{width:100%;max-width:1000px;position:relative;}
    .modal-inner::before,.modal-inner::after{content:'';position:absolute;width:36px;height:36px;pointer-events:none;z-index:2;}
    .modal-inner::before{top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
    .modal-inner::after{bottom:45px;right:-1px;border-bottom:2px solid var(--magenta);border-right:2px solid var(--magenta);}
    .close-btn{position:absolute;top:-2.8rem;right:0;font-family:'VT323',monospace;font-size:1rem;letter-spacing:.3em;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .2s;}
    .close-btn:hover{color:var(--cyan);text-shadow:0 0 10px var(--cyan);}
    .modal-video{aspect-ratio:16/9;background:#000;}
    .modal-video iframe{width:100%;height:100%;border:none;}

    @keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:none;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}

    /* gallery items */
    .gallery-item{position:relative;background:var(--deep);overflow:hidden;cursor:pointer;
      opacity:0;transform:translateY(20px);
      transition:opacity .6s ease,transform .6s ease,box-shadow .3s;border:1px solid var(--border);}
    .gallery-item.visible{opacity:1;transform:none;}
    .gallery-item:hover{box-shadow:0 0 0 1px rgba(0,245,255,.4),0 0 20px rgba(0,245,255,.12);z-index:2;}
    .gallery-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;}
    .gallery-thumb iframe{width:100%;height:100%;border:none;display:block;pointer-events:none;transition:transform .5s;}
    .gallery-item:hover .gallery-thumb iframe{transform:scale(1.05);}
    .g-overlay{position:absolute;inset:0;z-index:2;background:rgba(0,0,0,0);transition:background .3s;}
    .gallery-item:hover .g-overlay{background:rgba(0,245,255,.07);}
    .g-play{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;}
    .gallery-item:hover .g-play{opacity:1;}
    .play-ring{width:52px;height:52px;border-radius:50%;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--cyan);}
    .play-ring svg{fill:var(--cyan);margin-left:4px;filter:drop-shadow(0 0 6px var(--cyan));}

    /* contact */
    .contact-section{position:relative;z-index:1;padding:5rem 4rem;border-top:1px solid var(--border);}
    .contact-inner{max-width:640px;margin:0 auto;}
    .contact-eyebrow{font-family:'VT323',monospace;font-size:.85rem;letter-spacing:.4em;color:var(--cyan);text-shadow:0 0 10px var(--cyan);margin-bottom:.8rem;}
    .contact-title{font-family:'Raleway',sans-serif;font-size:clamp(1.5rem,3vw,2.5rem);font-weight:700;color:var(--lavender);margin-bottom:.5rem;}
    .contact-sub{font-size:.82rem;color:var(--muted);letter-spacing:.05em;line-height:1.8;margin-bottom:2.5rem;}
    .contact-form{display:flex;flex-direction:column;gap:1rem;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .form-field{display:flex;flex-direction:column;gap:.35rem;}
    .form-field label{font-family:'VT323',monospace;font-size:.75rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;}
    .form-field input,.form-field textarea,.form-field select{background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--text);padding:.75rem 1rem;font-family:'Raleway',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s,box-shadow .2s;resize:none;}
    .form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,245,255,.15);}
    .form-field textarea{min-height:120px;}
    .form-submit{font-family:'VT323',monospace;font-size:1rem;letter-spacing:.3em;text-transform:uppercase;padding:.8rem 2.5rem;background:transparent;border:1px solid var(--cyan);color:var(--cyan);cursor:pointer;transition:all .2s;align-self:flex-start;}
    .form-submit:hover{background:var(--cyan);color:#000;box-shadow:0 0 20px rgba(0,245,255,.4);}

    @media(max-width:900px){.form-row{grid-template-columns:1fr;}}
    @media(max-width:768px){
      header,.section-header,.contact-section,footer{padding-left:1.5rem;padding-right:1.5rem;}
      nav{gap:1.2rem;}
    }


    .page-hero{position:relative;z-index:1;padding:5rem 4rem 3rem;animation:fadeUp .8s ease both;}
    .page-eyebrow{font-family:'VT323',monospace;font-size:.85rem;letter-spacing:.4em;color:var(--cyan);text-shadow:0 0 10px var(--cyan);margin-bottom:.8rem;}
    .page-title{font-size:clamp(2rem,5vw,4rem);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 20%,var(--lavender) 50%,var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .filter-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:2rem;}
    .filter-tab{font-family:'VT323',monospace;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;padding:.3rem .9rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
    .filter-tab.active,.filter-tab:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 10px rgba(0,245,255,.2);}
    .port-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2rem 4rem 5rem;}
    @media(max-width:900px){.port-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:600px){.port-grid{grid-template-columns:1fr;padding-left:1.5rem;padding-right:1.5rem;}
    .page-hero{padding-left:1.5rem;padding-right:1.5rem;}}

  </style>
</head>

  <script>

    const observer = new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});
    },{threshold:.1});
    document.querySelectorAll('.gallery-item').forEach(el=>observer.observe(el));

    document.querySelectorAll('[data-src]').forEach(el=>{
      el.addEventListener('click',()=>{if(el.dataset.src) openModal(el.dataset.src);});
    });

    function openModal(src){
      document.getElementById('modal-video').innerHTML=`<iframe src="${src}" allow="autoplay;fullscreen" allowfullscreen></iframe>`;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow='hidden';
    }
    function closeModal(){
      document.getElementById('modal-video').innerHTML='';
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow='';
    }
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
    document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

    function toggleVHS(){
      document.body.classList.toggle('vhs');
      const btn=document.getElementById('vhsBtn');
      btn.textContent=document.body.classList.contains('vhs')?'◼ VHS OFF':'▶ VHS';
    }

    // parallax (only on pages with .parallax-img)
    const pbg=document.getElementById('parallax-bg');
    if(pbg){
      window.addEventListener('scroll',()=>{
        pbg.style.transform=`scale(1.05) translateY(${window.scrollY*.3}px)`;
      },{passive:true});
    }

    // smooth scroll to #contact if on subpage
    document.querySelectorAll('a[href*="#contact"]').forEach(a=>{
      a.addEventListener('click',e=>{
        const target=document.getElementById('contact');
        if(target){e.preventDefault();target.scrollIntoView({behavior:'smooth'});}
      });
    });

    function sendEmail(e){
      e.preventDefault();
      const name=document.getElementById('c-name').value;
      const email=document.getElementById('c-email').value;
      const subject=document.getElementById('c-subject').value;
      const message=document.getElementById('c-msg').value;
      const body=`Nome: ${name}%0AE-mail: ${email}%0A%0A${message}`;
      window.location.href=`mailto:ldms.motion@gmail.com?subject=${encodeURIComponent(subject+' — LDMSMotion')}&body=${body}`;
    }

  </script>
